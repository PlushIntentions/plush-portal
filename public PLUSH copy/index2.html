<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Technician Login</title>

  <style>
    body {
      background: linear-gradient(135deg, #fdf2f6, #ffe6ef);
      font-family: "Helvetica Neue", Arial, sans-serif;
      color: #333;
      text-align: center;
      padding-top: 60px;
    }

    .logo {
      width: 160px;
      margin-bottom: 20px;
    }

    .container-wrapper {
      position: relative;
      width: 60%;
      margin: auto;
      margin-top: 20px;
    }

    .container-wrapper::before {
      content: "";
      position: absolute;
      top: -12px;
      left: -12px;
      right: -12px;
      bottom: -12px;
      background: radial-gradient(circle, rgba(255,182,193,0.35), rgba(255,182,193,0));
      filter: blur(25px);
      animation: softGlow 4s ease-in-out infinite alternate;
      border-radius: 10px;
      z-index: -1;
    }

    @keyframes softGlow {
      from { opacity: 0.6; }
      to { opacity: 1; }
    }

    .login-box {
      background-color: #d2c2a8;
      padding: 30px;
      border-radius: 8px;
      border: 2px solid #f4b6c2;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      text-align: left;
    }

    h1 {
      color: #7a4f4f;
      font-size: 26px;
      margin-bottom: 25px;
      text-align: center;
      font-weight: 700;
    }

    label {
      font-size: 16px;
      font-weight: bold;
      color: #333;
    }

    select, input {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 20px;
      border-radius: 6px;
      border: 2px solid #bfae94;
      font-size: 16px;
    }

    .login-btn {
      background-color: #f4b6c2;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 14px 20px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
      width: 100%;
    }

    .login-btn:hover {
      background-color: #e89aaa;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <img src="PlushLogo1.jpg" class="logo" alt="Plush Intentions LLC Logo">

  <div class="container-wrapper">
    <div class="login-box">

      <h1>Technician Login</h1>

      <label for="techname">Tech Name</label>
      <select id="techname">
        <option>Loading...</option>
      </select>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password">

      <button class="login-btn" id="login-btn">Login</button>

    </div>
  </div>

  <script src="login.js"></script>

</body>
</html>
