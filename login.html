<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Technician Login • Plush Intentions</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header>
    <div class="header-left">PLUSH INTENTIONS</div>
    <div class="header-right">
      <a href="index.html">Home</a>
    </div>
  </header>

  <main class="main-shell">
    <section class="card">
      <div class="card-header">
        <div class="card-title">Technician Login</div>
        <div class="card-subtitle">
          Sign in to access your tools.
        </div>
      </div>

      <form action="dashboard.html" method="get">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" placeholder="Enter your email" required />
        </div>

        <button class="primary-btn" type="submit">Continue</button>
      </form>

      <div class="helper-text" style="margin-top: 14px;">
        Need access? Contact Dispatch.
      </div>
    </section>
  </main>
</body>
</html>
